services:
  - type: web
    name: nfc-care-cards
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_STORAGE_ROOT
        value: /var/data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_COOKIE_SECRET
        generateValue: true
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 5
